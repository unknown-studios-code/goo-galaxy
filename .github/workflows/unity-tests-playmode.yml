# This workflow executes Unity Play Mode tests on pull requests to main.
# Play Mode tests cover scene-level and integration behavior for Goo Galaxy runtime flows.

name: Unity Tests (Play Mode)

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  unity-tests-playmode:
    name: Unity Play Mode Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Create LFS file list
        run: git lfs ls-files -l | cut -d' ' -f1 | sort > .lfs-assets-id

      - name: Restore LFS cache
        uses: actions/cache@v5
        with:
          path: .git/lfs
          key: ${{ runner.os }}-lfs-${{ hashFiles('.lfs-assets-id') }}

      - name: Git LFS Pull
        run: git lfs pull

      - name: Restore Library cache
        uses: actions/cache@v5
        with:
          path: Library
          key: Library-Tests-PlayMode-${{ hashFiles('Assets/**', 'Packages/**') }}
          restore-keys: |
            Library-Tests-PlayMode-
            Library-

      - name: Run Play Mode Tests
        uses: game-ci/unity-test-runner@v4
        id: tests
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          testMode: playmode
          unityVersion: 6000.3.11f1
          containerRegistryImageVersion: 3.2.1
          checkName: Play Mode Test Results
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          coverageOptions: "generateAdditionalMetrics;generateHtmlReport;generateBadgeReport;assemblyFilters:+GooGalaxy.Runtime.*,-GooGalaxy.Tests.*"

      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: Test-Results-PlayMode
          path: ${{ steps.tests.outputs.artifactsPath }}

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: Coverage-Report-PlayMode
          path: ${{ steps.tests.outputs.coveragePath }}

      - name: Test Summary
        if: success()
        run: |
          echo "✅ All Play Mode tests passed!"
          echo ""
          echo "Test coverage report available in artifacts."
          echo "Integration tests validated gameplay scene and runtime flows."

      - name: Test Failed
        if: failure()
        run: |
          echo "❌ Play Mode tests failed!"
          echo ""
          echo "Check the test results artifact for details."
          echo "Review failing integration tests before merging to main."
