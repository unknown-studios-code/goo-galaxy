# This workflow executes Unity Play Mode tests on pull requests to main.
# Play Mode tests cover scene-level and integration behavior for Goo Galaxy runtime flows.

name: Unity Tests (Play Mode)

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  checks: write
  contents: read

env:
  UNITY_VERSION: ${{ vars.UNITY_VERSION }}
  UNITY_CACHE_VERSION: ${{ vars.UNITY_CACHE_VERSION }}
  UNITY_COVERAGE_OPTIONS: ${{ vars.UNITY_COVERAGE_OPTIONS }}
  CI_FETCH_DEPTH: ${{ vars.CI_FETCH_DEPTH }}
  ARTIFACT_RETENTION_DAYS: ${{ vars.ARTIFACT_RETENTION_DAYS }}

jobs:
  unity-tests-playmode:
    name: Unity Play Mode Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Validate required CI variables
        env:
          UNITY_VERSION: ${{ env.UNITY_VERSION }}
          UNITY_CACHE_VERSION: ${{ env.UNITY_CACHE_VERSION }}
          UNITY_COVERAGE_OPTIONS: ${{ env.UNITY_COVERAGE_OPTIONS }}
          CI_FETCH_DEPTH: ${{ env.CI_FETCH_DEPTH }}
          ARTIFACT_RETENTION_DAYS: ${{ env.ARTIFACT_RETENTION_DAYS }}
        shell: bash
        run: |
          missing=0

          for variable_name in UNITY_VERSION UNITY_CACHE_VERSION UNITY_COVERAGE_OPTIONS CI_FETCH_DEPTH ARTIFACT_RETENTION_DAYS; do
            if [[ -z "${!variable_name}" ]]; then
              echo "Missing required GitHub Actions variable: $variable_name" >&2
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: ${{ env.CI_FETCH_DEPTH }}
          lfs: true

      - name: Create LFS file list
        shell: bash
        run: git lfs ls-files -l | cut -d' ' -f1 | sort > .lfs-assets-id

      - name: Restore LFS cache
        uses: actions/cache@v5
        with:
          path: .git/lfs
          key: ${{ runner.os }}-lfs-${{ hashFiles('.lfs-assets-id') }}
          restore-keys: |
            ${{ runner.os }}-lfs-

      - name: Pull LFS assets
        shell: bash
        run: git lfs pull

      - name: Run Play Mode tests
        uses: ./.github/actions/unity-test
        with:
          unity-version: ${{ env.UNITY_VERSION }}
          test-mode: playmode
          library-cache-key: Library-Tests-PlayMode-${{ runner.os }}-${{ env.UNITY_VERSION }}-${{ env.UNITY_CACHE_VERSION }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          library-cache-restore-keys: |
            Library-Tests-PlayMode-${{ runner.os }}-${{ env.UNITY_VERSION }}-${{ env.UNITY_CACHE_VERSION }}-
            Library-Tests-PlayMode-${{ runner.os }}-${{ env.UNITY_VERSION }}-
            Library-Tests-PlayMode-${{ runner.os }}-
            Library-Tests-PlayMode-
            Library-
          unity-license: ${{ secrets.UNITY_LICENSE }}
          unity-email: ${{ secrets.UNITY_EMAIL }}
          unity-password: ${{ secrets.UNITY_PASSWORD }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          check-name: Unity Play Mode Test Results
          coverage-options: ${{ env.UNITY_COVERAGE_OPTIONS }}
          test-results-artifact-name: Test-Results-PlayMode
          coverage-artifact-name: Coverage-Report-PlayMode
          artifact-retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
