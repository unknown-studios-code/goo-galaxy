# This workflow validates repository formatting through dedicated tools.
# It checks EditorConfig compliance, C# formatting through CSharpier, and
# JSON/Markdown/YAML formatting through Prettier.

name: Format Check

on:
  pull_request:
    paths:
      - "**"
      - "!.git/**"
      - "!Library/**"
      - "!Temp/**"
      - "!Logs/**"
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: |
          npm ci --ignore-scripts

      - name: Restore .NET tools
        run: |
          dotnet tool restore

      - name: Run EditorConfig checks
        uses: editorconfig-checker/action-editorconfig-checker@v2
        with:
          version: latest

      - name: Execute EditorConfig checks
        working-directory: Assets/Scripts
        run: |
          editorconfig-checker -config ../../.editorconfig-checker.json

      - name: Run CSharpier checks
        run: |
          npm run check:csharpier

      - name: Run Prettier checks
        run: |
          npm run check:prettier

      - name: Show Validation Summary
        if: success()
        run: |
          echo "✅ All repository formatting checks passed!"
          echo ""
          echo "Validated:"
          echo "  - EditorConfig indentation rules"
          echo "  - EditorConfig line ending rules"
          echo "  - EditorConfig final newline rules"
          echo "  - EditorConfig trailing whitespace rules"
          echo "  - CSharpier rules for runtime scripts"
          echo "  - Prettier checks for JSON, Markdown, and YAML"

      - name: Show Validation Errors
        if: failure()
        run: |
          echo "❌ Repository formatting validation failed!"
          echo ""
          echo "The logs above show which validation tool failed."
          echo ""
          echo "To fix locally:"
          echo "  1. Install project dependencies: npm ci"
          echo "  2. Restore .NET tools: dotnet tool restore"
          echo "  3. Run EditorConfig, CSharpier, and Prettier locally"
          echo "  4. Commit and push again"
