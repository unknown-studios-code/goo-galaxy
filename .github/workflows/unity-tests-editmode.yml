# This workflow executes Unity Edit Mode tests on pull requests to main.
# Edit Mode tests cover deterministic runtime logic and data validation without entering Play Mode.

name: Unity Tests (Edit Mode)

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  unity-tests-editmode:
    name: Unity Edit Mode Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Create LFS file list
        run: git lfs ls-files -l | cut -d' ' -f1 | sort > .lfs-assets-id

      - name: Restore LFS cache
        uses: actions/cache@v5
        with:
          path: .git/lfs
          key: ${{ runner.os }}-lfs-${{ hashFiles('.lfs-assets-id') }}

      - name: Git LFS Pull
        run: git lfs pull

      - name: Restore Library cache
        uses: actions/cache@v5
        with:
          path: Library
          key: Library-Tests-EditMode-${{ hashFiles('Assets/**', 'Packages/**') }}
          restore-keys: |
            Library-Tests-EditMode-
            Library-

      - name: Run Edit Mode Tests
        uses: game-ci/unity-test-runner@v4
        id: tests
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          testMode: editmode
          unityVersion: 6000.3.11f1
          containerRegistryImageVersion: 3.2.1
          checkName: Edit Mode Test Results
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          coverageOptions: "generateAdditionalMetrics;generateHtmlReport;generateBadgeReport;assemblyFilters:+GooGalaxy.Runtime.*,-GooGalaxy.Tests.*"

      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: Test-Results-EditMode
          path: ${{ steps.tests.outputs.artifactsPath }}

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: Coverage-Report-EditMode
          path: ${{ steps.tests.outputs.coveragePath }}

      - name: Test Summary
        if: success()
        run: |
          echo "✅ All Edit Mode tests passed!"
          echo ""
          echo "Deterministic board, card, and match logic validated."
          echo "Coverage report available in artifacts."

      - name: Test Failed
        if: failure()
        run: |
          echo "❌ Edit Mode tests failed!"
          echo ""
          echo "Check the test results artifact for details."
          echo "Review failing tests and fix issues before merging."
